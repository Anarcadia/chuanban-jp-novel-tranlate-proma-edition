# 自检模块配置

# 状态: 开启/关闭
状态: 开启

# 模型来源: 内置/外接API
# - 内置: 使用当前Claude执行自检
# - 外接API: 调用外部API（需配置下方信息）
模型来源: 内置

# 外接API配置
# 仅当"模型来源: 外接API"时使用
# 接入点格式为OpenAI兼容格式
外接API配置:
  接入点: ""          # 例如: https://api.openai.com/v1
  密钥: ""            # API密钥
  模型名: ""          # 例如: gpt-4o-mini

# 配置说明:
# 1. 如使用内置模型，只需设置"状态: 开启"即可
# 2. 如使用外接API，需要:
#    - 将"模型来源"改为"外接API"
#    - 填写外接API配置的三个字段
# 3. 外接API需兼容OpenAI格式（支持/chat/completions端点）

